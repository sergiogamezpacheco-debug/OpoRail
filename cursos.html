<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cursos | OpoRail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased bg-white">

  <!-- Header común -->
  <div id="site-header"></div>
  <script src="/js/load-header.js"></script>

  <!-- Hero de Cursos -->
  <section class="text-center py-16 bg-gradient-to-r from-green-700 to-purple-700 text-white">
    <div class="container mx-auto px-4">
      <h1 class="text-4xl font-bold mb-3">Cursos de Preparación Renfe</h1>
      <p class="text-lg text-gray-100">Selecciona tu especialidad y empieza a prepararte con OpoRail</p>
    </div>
  </section>

  <!-- Listado de cursos -->
  <section class="py-12 px-4 container mx-auto">
    <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Especialidades disponibles</h2>
    <div id="courses-list" class="grid sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
  </section>

  <!-- Footer -->
  <div id="site-footer" class="mt-8"></div>

  <!-- Scripts -->
  <script src="js/load-data.js"></script>
</body>
</html>
