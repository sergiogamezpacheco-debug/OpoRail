<body class="font-sans text-gray-800">
  <header class="flex justify-between items-center px-8 py-4 shadow-md">

      <span class="text-green-700">Opo</span><span class="text-purple-700">Rail</span>

    <nav class="space-x-6">

  <section class="py-12 px-8 grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto">

    <div class="bg-white shadow-lg p-6 rounded-lg text-center border">
      <h3 class="text-xl font-bold mb-2">Business</h3>
      <p class="mb-4">Acceso total + formación personalizada</p>

      <button class="bg-green-700 text-white px-4 py-2 rounded">Probar</button>
