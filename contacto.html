<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contacto | OpoRail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased bg-white">
  <!-- Header común -->
  <div id="site-header"></div>
  <script src="/js/load-header.js"></script>

  <section id="hero">
    <div class="container mx-auto px-4 text-center">
      <h1 class="text-4xl font-bold mb-4">Contacto</h1>
      <p class="text-lg">¿Tienes alguna duda o propuesta? Escríbenos.</p>
    </div>
  </section>

  <section class="py-12 px-4 container mx-auto text-center">
    <form class="max-w-md mx-auto bg-gray-100 p-6 rounded-lg shadow-md">
      <input type="text" placeholder="Tu nombre" class="w-full p-3 mb-4 rounded border" />
      <input type="email" placeholder="Tu correo" class="w-full p-3 mb-4 rounded border" />
      <textarea placeholder="Tu mensaje" class="w-full p-3 mb-4 rounded border"></textarea>
      <button type="submit" class="bg-purple-700 text-white px-6 py-2 rounded font-semibold hover:bg-purple-800">Enviar</button>
    </form>
  </section>

  <!-- Footer común -->
  <div id="site-footer"></div>
  <script src="js/load-data.js"></script>
</body>
</html>
