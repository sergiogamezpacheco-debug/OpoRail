<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contacto | OpoRail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased bg-white">

  <!-- Header -->
  <div id="site-header"></div>

  <!-- Hero -->
  <section class="text-center py-16 bg-gradient-to-r from-green-700 to-purple-700 text-white">
    <div class="container mx-auto px-4">
      <h1 class="text-4xl font-bold mb-3">Contacto OpoRail</h1>
      <p class="text-lg text-gray-100">¿Tienes dudas o sugerencias? Escríbenos y te ayudaremos.</p>
    </div>
  </section>

  <!-- Formulario -->
  <section class="py-12 px-4 container mx-auto">
    <form class="max-w-lg mx-auto bg-white shadow-lg rounded-lg p-8">
      <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">Nombre</label>
        <input type="text" class="w-full border rounded-lg px-4 py-2" placeholder="Tu nombre">
      </div>
      <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">Correo</label>
        <input type="email" class="w-full border rounded-lg px-4 py-2" placeholder="Tu correo">
      </div>
      <div class="mb-6">
        <label class="block text-gray-700 font-semibold mb-2">Mensaje</label>
        <textarea class="w-full border rounded-lg px-4 py-2 h-32" placeholder="Escribe tu mensaje aquí..."></textarea>
      </div>
      <button type="submit" class="bg-purple-700 text-white px-6 py-2 rounded-lg font-semibold hover:bg-purple-800 transition">Enviar mensaje</button>
    </form>
  </section>

  <!-- Footer -->
  <div id="site-footer"></div>

  <script src="/js/load-header.js"></script>
  <script src="/js/load-footer.js"></script>
</body>
</html>
